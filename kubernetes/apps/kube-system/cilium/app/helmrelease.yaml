---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.15.0
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    k8sServiceHost: "localhost"
    k8sServicePort: "7445"
    rollOutCiliumPods: true
    securityContext:
      capabilities:
        ciliumAgent:
          # Use to set socket permission
          - CHOWN
          # Used to terminate envoy child process
          - KILL
          # Used since cilium modifies routing tables, etc...
          - NET_ADMIN
          # Used since cilium creates raw sockets, etc...
          - NET_RAW
          # Used since cilium monitor uses mmap
          - IPC_LOCK
          # Used in iptables. Consider removing once we are iptables-free
          # - SYS_MODULE
          # We need it for now but might not need it for >= 5.11 specially
          # for the 'SYS_RESOURCE'.
          # In >= 5.8 there's already BPF and PERMON capabilities
          - SYS_ADMIN
          # Could be an alternative for the SYS_ADMIN for the RLIMIT_NPROC
          - SYS_RESOURCE
          # Both PERFMON and BPF requires kernel 5.8, container runtime
          # cri-o >= v1.22.0 or containerd >= v1.5.0.
          # If available, SYS_ADMIN can be removed.
          #- PERFMON
          #- BPF
          # Allow discretionary access control (e.g. required for package installation)
          - DAC_OVERRIDE
          # Allow to set Access Control Lists (ACLs) on arbitrary files (e.g. required for package installation)
          - FOWNER
          # Allow to execute program that changes GID (e.g. required for package installation)
          - SETGID
          # Allow to execute program that changes UID (e.g. required for package installation)
          - SETUID
        cleanCiliumState:
          # Most of the capabilities here are the same ones used in the
          # cilium-agent's container because this container can be used to
          # uninstall all Cilium resources, and therefore it is likely that
          # will need the same capabilities.
          # Used since cilium modifies routing tables, etc...
          - NET_ADMIN
          # Used in iptables. Consider removing once we are iptables-free
          # - SYS_MODULE
          # We need it for now but might not need it for >= 5.11 specially
          # for the 'SYS_RESOURCE'.
          # In >= 5.8 there's already BPF and PERMON capabilities
          - SYS_ADMIN
          # Could be an alternative for the SYS_ADMIN for the RLIMIT_NPROC
          - SYS_RESOURCE
          # Both PERFMON and BPF requires kernel 5.8, container runtime
          # cri-o >= v1.22.0 or containerd >= v1.5.0.
          # If available, SYS_ADMIN can be removed.
          #- PERFMON
          #- BPF
    autoDirectNodeRoutes: true
    bpf:
      masquerade: true
      tproxy: true
    hubble:
      relay:
        # -- Enable Hubble Relay (requires hubble.enabled=true)
        enabled: true
        prometheus:
          serviceMonitor:
            enabled: true
        # -- Roll out Hubble Relay pods automatically when configmap is updated.
        rollOutPods: true
      ui:
        enabled: true
        rollOutPods: true
        className: internal
        annotations:
          hajimari.io/icon: simple-icons:cilium
        hosts:
          - "hubble.${SECRET_DOMAIN}"
        tls:
          - hosts:
              - "hubble.${SECRET_DOMAIN}"
      metrics:
        enabled:
          - dns:query
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true
          annotations:
            grafana_folder: Cilium
    ipam:
      mode: "kubernetes"
    kubeProxyReplacement: "true"
    ipv4NativeRoutingCIDR: "10.244.0.0/16"
    loadBalancer:
      algorithm: maglev
      mode: dsr
    routingMode: "native"
    operator:
      rollOutPods: true
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
