---
version: "3"

tasks:

  deps:
    desc: Install workstation dependencies with Brew
    cmds:
      - brew upgrade
      - brew install {{.DEPS}} {{.CLI_ARGS}}
      - asdf install talhelper latest
      - asdf global talhelper latest
    preconditions:
      - sh: command -v brew
        msg: |
          Homebrew is not installed. Using MacOS, Linux or WSL?
          Head over to https://brew.sh to get up and running.
    vars:
      DEPS: >-
        age
        cilium-cli
        cloudflared
        fluxcd/tap/flux
        helm
        jq
        k9s
        kubernetes-cli
        kustomize
        sops
        stern
        yq
        adsf
